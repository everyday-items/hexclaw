name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  test-windows:
    name: Test (Windows Sandbox)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure private modules
        shell: pwsh
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Build all
        run: go build ./...
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Run sandbox tests
        run: go test -v -count=1 -timeout 120s ./sandbox/...
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Run core tests
        run: go test -count=1 -timeout 300s ./engine/... ./config/... ./security/... ./mcp/... ./session/... ./skill/...
        env:
          GOPRIVATE: github.com/hexagon-codes/*

  test-macos:
    name: Test (macOS Sandbox)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Run sandbox tests
        run: go test -v -count=1 -timeout 120s ./sandbox/...
        env:
          GOPRIVATE: github.com/hexagon-codes/*
